<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta namer="iewport" content="width=devise-width", initial-scale="1.0">
    <title>1st Game</title>
    <link rel="stylesheet" href="tictactoe.css">

</head>

<body class="tictactoe">

    <img src="assets/tictactoebackground.png" class="tictactoe-background">

    <div class="container">
     <img src="assets/tictactoelogo.png" class="title-tictactoe">

     <h2 class="status">Player's turn</h2>

        <div class="board">
            <div class="cell" cellIndex="0"></div>
            <div class="cell" cellIndex="1"></div>
            <div class="cell" cellIndex="2"></div>
            <div class="cell" cellIndex="3"></div>
            <div class="cell" cellIndex="4"></div>
            <div class="cell" cellIndex="5"></div>
            <div class="cell" cellIndex="6"></div>
            <div class="cell" cellIndex="7"></div>
            <div class="cell" cellIndex="8"></div>
        </div>

        <button class="next-level">Continue</button>
        <button class="restart-btn">Try Again</button>
    </div>

    <script src="tictactoe.js"></script>
</body>
</html>
